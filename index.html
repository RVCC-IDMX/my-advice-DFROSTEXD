<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What Should I Watch?</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body>
    <header>
      <h1>🎬 What Should I Watch?</h1>
      <p>Find your next favorite movie or TV show based on your preferences</p>
    </header>

    <main>
      <section class="preferences-section">
        <h2>Your Preferences</h2>
        <form id="preferences-form">
          <div class="form-group">
            <label for="genre-select">Genre</label>
            <select id="genre-select">
              <option value="any">Any Genre</option>
              <option value="Action">Action</option>
              <option value="Comedy">Comedy</option>
              <option value="Drama">Drama</option>
              <option value="Sci-Fi">Sci-Fi</option>
              <option value="Thriller">Thriller</option>
              <option value="Animation">Animation</option>
              <option value="Crime">Crime</option>
            </select>
          </div>

          <div class="form-group">
            <label for="length-select">Length</label>
            <select id="length-select">
              <option value="any">Any Length</option>
              <option value="short">
                Quick Watch (&lt; 90 min / &lt; 30 min episodes)
              </option>
              <option value="medium">
                Medium (90-150 min / 30-60 min episodes)
              </option>
              <option value="long">Long (150+ min / 60+ min episodes)</option>
            </select>
          </div>

          <div class="form-group">
            <label for="rating-select">Minimum Rating</label>
            <select id="rating-select">
              <option value="0">Any Rating</option>
              <option value="3">3+ Stars</option>
              <option value="3.5">3.5+ Stars</option>
              <option value="4">4+ Stars</option>
              <option value="4.5">4.5+ Stars</option>
            </select>
          </div>

          <button type="submit">Get Recommendations</button>
        </form>
      </section>

      <section class="results-section">
        <h2>Recommendations</h2>
        <div id="results-container"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 What Should I Watch?</p>
    </footer>

    <script type="module" src="/src/js/app.js"></script>
    <script type="module" src="/src/js/experiments.js"></script>
  </body>
</html>
